x-aiws-environment: &aiws-environment
  AIWS_CONFIG: /tmp/aiws/config.jsonc
  AIWS_DBINIT: /tmp/aiws/dbinit.jsonc
  AIWS_CONFIG_MODE: generated
  AIWS_ENVIRONMENT: ${AIWS_ENVIRONMENT:-development}
  AIWS_PUBLIC_BASE_URL: ${AIWS_PUBLIC_BASE_URL:-http://127.0.0.1:8000}
  AIWS_CORS_ALLOWED_ORIGINS: ${AIWS_CORS_ALLOWED_ORIGINS:-[]}
  AIWS_TRUSTED_PROXY_CIDRS: ${AIWS_TRUSTED_PROXY_CIDRS:-["172.30.0.0/24"]}
  AIWS_IDENTITY_MODE: ${AIWS_IDENTITY_MODE:-}
  AIWS_DB_HOST: postgres
  AIWS_DB_PORT: "5432"
  AIWS_DB_APP_PASSWORD: ${AIWS_DB_APP_PASSWORD:?set AIWS_DB_APP_PASSWORD in .env}
  AIWS_DB_MIGRATOR_PASSWORD: ${AIWS_DB_MIGRATOR_PASSWORD:?set AIWS_DB_MIGRATOR_PASSWORD in .env}
  AIWS_DB_DASHBOARD_PASSWORD: ${AIWS_DB_DASHBOARD_PASSWORD:?set AIWS_DB_DASHBOARD_PASSWORD in .env}
  AIWS_TRUSTED_PROXY_HMAC_SECRET: ${AIWS_TRUSTED_PROXY_HMAC_SECRET:-}
  AIWS_DASHBOARD_OPERATOR_TOKEN: ${AIWS_DASHBOARD_OPERATOR_TOKEN:?set AIWS_DASHBOARD_OPERATOR_TOKEN in .env}
  AIWS_AI_PROVIDER: ${AIWS_AI_PROVIDER:-mock}
  AIWS_AI_MODEL: ${AIWS_AI_MODEL:-mock-deterministic-v1}
  AIWS_AI_BASE_URL: ${AIWS_AI_BASE_URL:-}
  AIWS_AI_DATA_REGION: ${AIWS_AI_DATA_REGION:-private_deployment}
  AIWS_LLM_API_KEY: ${AIWS_LLM_API_KEY:-}

x-aiws-service: &aiws-service
  image: ai-job-workspace-backend:${AIWS_IMAGE_TAG:-local}
  build:
    context: .
    dockerfile: Dockerfile
  environment: *aiws-environment
  init: true
  read_only: true
  tmpfs:
    - /tmp:mode=1777
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  networks:
    - private
  logging:
    driver: json-file
    options:
      max-size: 10m
      max-file: "3"

services:
  postgres:
    image: pgvector/pgvector:0.8.2-pg17-bookworm
    restart: unless-stopped
    shm_size: 256mb
    environment:
      POSTGRES_DB: ai_job_workspace
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${AIWS_DB_ADMIN_PASSWORD:?set AIWS_DB_ADMIN_PASSWORD in .env}
      POSTGRES_INITDB_ARGS: --data-checksums --auth-host=scram-sha-256
      AIWS_DB_APP_PASSWORD: ${AIWS_DB_APP_PASSWORD:?set AIWS_DB_APP_PASSWORD in .env}
      AIWS_DB_MIGRATOR_PASSWORD: ${AIWS_DB_MIGRATOR_PASSWORD:?set AIWS_DB_MIGRATOR_PASSWORD in .env}
      AIWS_DB_DASHBOARD_PASSWORD: ${AIWS_DB_DASHBOARD_PASSWORD:?set AIWS_DB_DASHBOARD_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./deploy/docker/postgres-init.sh:/docker-entrypoint-initdb.d/10-aiws.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - private
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

  migrate:
    <<: *aiws-service
    restart: "no"
    command:
      - dbctl
      - --config
      - /tmp/aiws/config.jsonc
      - --dbinit
      - /tmp/aiws/dbinit.jsonc
      - migrate
      - --revision
      - head
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    <<: *aiws-service
    restart: unless-stopped
    command: ["backend", "--config", "/tmp/aiws/config.jsonc"]
    depends_on:
      postgres:
        condition: service_healthy
        restart: true
      migrate:
        condition: service_completed_successfully
    volumes:
      - application_data:/var/lib/aiws
    ports:
      - "127.0.0.1:${AIWS_BACKEND_PORT:-8000}:8000"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >-
          import urllib.request;
          urllib.request.urlopen('http://127.0.0.1:8000/_internal/healthz', timeout=2).read()
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s

  dashboard:
    <<: *aiws-service
    profiles: ["dashboard"]
    restart: unless-stopped
    command: ["dashboard-api", "--config", "/tmp/aiws/config.jsonc"]
    depends_on:
      postgres:
        condition: service_healthy
        restart: true
      migrate:
        condition: service_completed_successfully
    ports:
      - "127.0.0.1:${AIWS_DASHBOARD_PORT:-8010}:8010"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >-
          import urllib.request;
          urllib.request.urlopen('http://127.0.0.1:8010/dashboard/v1/healthz', timeout=2).read()
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s

volumes:
  postgres_data:
  application_data:

networks:
  private:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24
