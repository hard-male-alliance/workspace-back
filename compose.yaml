  AIWS_CONFIG: /tmp/aiws/config.jsonc
  AIWS_ENVIRONMENT: ${AIWS_ENVIRONMENT:-}
  AIWS_PUBLIC_BASE_URL: ${AIWS_PUBLIC_BASE_URL:-}
  AIWS_CORS_ALLOWED_ORIGINS: ${AIWS_CORS_ALLOWED_ORIGINS:-}
  AIWS_TRUSTED_PROXY_CIDRS: ${AIWS_TRUSTED_PROXY_CIDRS:-}
  AIWS_CURSOR_HMAC_SECRET: ${AIWS_CURSOR_HMAC_SECRET:-}
  AIWS_SENSITIVE_IDEMPOTENCY_HMAC_SECRET: ${AIWS_SENSITIVE_IDEMPOTENCY_HMAC_SECRET:-}
  AIWS_IDENTITY_EMAIL_ACTIVE_KEY_ID: ${AIWS_IDENTITY_EMAIL_ACTIVE_KEY_ID:-}
  AIWS_IDENTITY_EMAIL_ENCRYPTION_KEYS: ${AIWS_IDENTITY_EMAIL_ENCRYPTION_KEYS:-}
  AIWS_IDENTITY_EMAIL_RATE_LIMIT_HMAC_KEY: ${AIWS_IDENTITY_EMAIL_RATE_LIMIT_HMAC_KEY:-}
  AIWS_IDENTITY_EMAIL_FROM_ADDRESS: ${AIWS_IDENTITY_EMAIL_FROM_ADDRESS:-}
  AIWS_IDENTITY_EMAIL_SMTP_HOST: ${AIWS_IDENTITY_EMAIL_SMTP_HOST:-}
  AIWS_IDENTITY_EMAIL_SMTP_USERNAME: ${AIWS_IDENTITY_EMAIL_SMTP_USERNAME:-}
  AIWS_IDENTITY_EMAIL_SMTP_PASSWORD: ${AIWS_IDENTITY_EMAIL_SMTP_PASSWORD:-}
  AIWS_DASHBOARD_OPERATOR_TOKEN: ${AIWS_DASHBOARD_OPERATOR_TOKEN:?set AIWS_DASHBOARD_OPERATOR_TOKEN in .env}
  AIWS_AI_PROVIDER: ${AIWS_AI_PROVIDER:-}
  AIWS_AI_MODEL: ${AIWS_AI_MODEL:-}
  AIWS_AI_BASE_URL: ${AIWS_AI_BASE_URL:-}
  AIWS_AI_DATA_REGION: ${AIWS_AI_DATA_REGION:-}
  AIWS_AI_EMBEDDING_PROVIDER: ${AIWS_AI_EMBEDDING_PROVIDER:-}
  AIWS_AI_EMBEDDING_MODEL: ${AIWS_AI_EMBEDDING_MODEL:-}
  AIWS_AI_EMBEDDING_MODEL_REVISION: ${AIWS_AI_EMBEDDING_MODEL_REVISION:-}
  AIWS_AI_EMBEDDING_DIMENSION: ${AIWS_AI_EMBEDDING_DIMENSION:-}
  AIWS_LLM_API_KEY: ${AIWS_LLM_API_KEY:-}
  AIWS_RESUME_RENDERER_ADAPTER: ${AIWS_RESUME_RENDERER_ADAPTER:-}
  AIWS_RESUME_XELATEX_COMMAND: ${AIWS_RESUME_XELATEX_COMMAND:-}
  AIWS_KNOWLEDGE_CONNECTION_PROVIDERS: ${AIWS_KNOWLEDGE_CONNECTION_PROVIDERS:-}
  AIWS_KNOWLEDGE_PROVIDER_SESSION_ACTIVE_KEY_ID: ${AIWS_KNOWLEDGE_PROVIDER_SESSION_ACTIVE_KEY_ID:-}
  AIWS_KNOWLEDGE_PROVIDER_SESSION_KEYS: ${AIWS_KNOWLEDGE_PROVIDER_SESSION_KEYS:-}
  AIWS_KNOWLEDGE_CREDENTIAL_ACTIVE_KEY_ID: ${AIWS_KNOWLEDGE_CREDENTIAL_ACTIVE_KEY_ID:-}
  AIWS_KNOWLEDGE_CREDENTIAL_KEYS: ${AIWS_KNOWLEDGE_CREDENTIAL_KEYS:-}
  AIWS_KNOWLEDGE_CREDENTIAL_FINGERPRINT_HMAC_KEY: ${AIWS_KNOWLEDGE_CREDENTIAL_FINGERPRINT_HMAC_KEY:-}
  AIWS_KNOWLEDGE_CREDENTIAL_REFERENCE_HMAC_KEY: ${AIWS_KNOWLEDGE_CREDENTIAL_REFERENCE_HMAC_KEY:-}
  AIWS_KNOWLEDGE_LOCAL_UPLOAD_SIGNING_HMAC_KEY: ${AIWS_KNOWLEDGE_LOCAL_UPLOAD_SIGNING_HMAC_KEY:-}
  AIWS_KNOWLEDGE_S3_ENDPOINT: ${AIWS_KNOWLEDGE_S3_ENDPOINT:-}
  AIWS_KNOWLEDGE_S3_REGION: ${AIWS_KNOWLEDGE_S3_REGION:-}
  AIWS_KNOWLEDGE_S3_BUCKET: ${AIWS_KNOWLEDGE_S3_BUCKET:-}
  AIWS_KNOWLEDGE_S3_ACCESS_KEY_ID: ${AIWS_KNOWLEDGE_S3_ACCESS_KEY_ID:-}
  AIWS_KNOWLEDGE_S3_SECRET_ACCESS_KEY: ${AIWS_KNOWLEDGE_S3_SECRET_ACCESS_KEY:-}
  AIWS_KNOWLEDGE_S3_SESSION_TOKEN: ${AIWS_KNOWLEDGE_S3_SESSION_TOKEN:-}
  AIWS_KNOWLEDGE_S3_OBJECT_PREFIX: ${AIWS_KNOWLEDGE_S3_OBJECT_PREFIX:-}
  AIWS_KNOWLEDGE_MALWARE_MODE: ${AIWS_KNOWLEDGE_MALWARE_MODE:-}
  AIWS_KNOWLEDGE_CLAMAV_HOST: ${AIWS_KNOWLEDGE_CLAMAV_HOST:-}
  AIWS_KNOWLEDGE_CLAMAV_PORT: ${AIWS_KNOWLEDGE_CLAMAV_PORT:-}
  AIWS_KNOWLEDGE_SOURCE_ALLOWED_HOST_PATTERNS: ${AIWS_KNOWLEDGE_SOURCE_ALLOWED_HOST_PATTERNS:-}
  AIWS_INTERVIEW_REALTIME_ACTIVE_KEY_ID: ${AIWS_INTERVIEW_REALTIME_ACTIVE_KEY_ID:-}
  AIWS_INTERVIEW_REALTIME_SIGNING_KEYS: ${AIWS_INTERVIEW_REALTIME_SIGNING_KEYS:-}
  AIWS_INTERVIEW_SIGNALING_URL: ${AIWS_INTERVIEW_SIGNALING_URL:-}
  AIWS_INTERVIEW_ICE_URLS: ${AIWS_INTERVIEW_ICE_URLS:-}

x-aiws-image: &aiws-image
  image: ai-job-workspace-backend:${AIWS_IMAGE_TAG:-local}
  build:
    context: .
    dockerfile: Dockerfile

x-aiws-runtime-service: &aiws-runtime-service
  <<: *aiws-image
  environment: *aiws-runtime-environment
  init: true
  pids_limit: 256
  read_only: true
  tmpfs:
    - /tmp:mode=1777
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  networks:
    - private
  volumes:
    - runtime_config:/var/lib/aiws-config:ro
  logging:
    driver: json-file
    options:
      max-size: 10m
      max-file: "3"

services:
  postgres:
    image: pgvector/pgvector:0.8.2-pg17-bookworm
    restart: unless-stopped
    shm_size: 256mb
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${AIWS_DB_ADMIN_PASSWORD:?set AIWS_DB_ADMIN_PASSWORD in .env}
      POSTGRES_INITDB_ARGS: --data-checksums --auth-host=scram-sha-256
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - private
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

  bootstrap:
    <<: *aiws-image
    profiles: ["tools"]
    entrypoint: ["dbctl"]
    working_dir: /var/lib/aiws-config
    command:
      - --dbinit
      - /app/deploy/docker/dbinit.jsonc
      - bootstrap
      - --access-mode
      - prompt
    environment:
      PGHOST: postgres
      PGPORT: "5432"
    stdin_open: true
    tty: true
    read_only: true
    tmpfs:
      - /tmp:mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - private
    volumes:
      - runtime_config:/var/lib/aiws-config
    depends_on:
      postgres:
        condition: service_healthy

  migrate:
    <<: *aiws-image
    profiles: ["tools"]
    entrypoint: ["dbctl"]
    working_dir: /var/lib/aiws-config
    command:
      - --dbinit
      - /app/deploy/docker/dbinit.jsonc
      - migrate
      - --revision
      - head
    read_only: true
    tmpfs:
      - /tmp:mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - private
    volumes:
      - runtime_config:/var/lib/aiws-config:ro
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    <<: *aiws-runtime-service
    restart: unless-stopped
    command: ["backend", "--config", "/tmp/aiws/config.jsonc"]
    depends_on:
      postgres:
        condition: service_healthy
        restart: true
    volumes:
      - runtime_config:/var/lib/aiws-config:ro
      - application_data:/var/lib/aiws
    ports:
      - "127.0.0.1:${AIWS_BACKEND_PORT:-9000}:9000"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >-
          import urllib.request;
          urllib.request.urlopen('http://127.0.0.1:9000/_internal/healthz', timeout=2).read()
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s

  dashboard:
    <<: *aiws-runtime-service
    profiles: ["dashboard"]
    restart: unless-stopped
    command: ["dashboard-api", "--config", "/tmp/aiws/config.jsonc"]
    depends_on:
      postgres:
        condition: service_healthy
        restart: true
    ports:
      - "127.0.0.1:${AIWS_DASHBOARD_PORT:-8010}:8010"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >-
          import urllib.request;
          urllib.request.urlopen('http://127.0.0.1:8010/dashboard/v1/healthz', timeout=2).read()
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s

volumes:
  postgres_data:
  runtime_config:
  application_data:

networks:
  private:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24
