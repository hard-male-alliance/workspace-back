x-aiws-image: &aiws-image
  image: ai-job-workspace-backend:${AIWS_IMAGE_TAG:-local}
  build:
    context: .
    dockerfile: Dockerfile

x-aiws-runtime-service: &aiws-runtime-service
  <<: *aiws-image
  init: true
  read_only: true
  tmpfs:
    - /tmp:mode=1777
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  networks:
    - private
  volumes:
    - runtime_config:/var/lib/aiws-config:ro
  logging:
    driver: json-file
    options:
      max-size: 10m
      max-file: "3"

services:
  postgres:
    image: pgvector/pgvector:0.8.2-pg17-bookworm
    restart: unless-stopped
    shm_size: 256mb
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${AIWS_DB_ADMIN_PASSWORD:?set AIWS_DB_ADMIN_PASSWORD in .env}
      POSTGRES_INITDB_ARGS: --data-checksums --auth-host=scram-sha-256
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - private
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

  bootstrap:
    <<: *aiws-image
    profiles: ["tools"]
    entrypoint: ["dbctl"]
    working_dir: /var/lib/aiws-config
    command:
      - --dbinit
      - /app/deploy/docker/dbinit.jsonc
      - bootstrap
      - --access-mode
      - prompt
    environment:
      PGHOST: postgres
      PGPORT: "5432"
    stdin_open: true
    tty: true
    read_only: true
    tmpfs:
      - /tmp:mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - private
    volumes:
      - runtime_config:/var/lib/aiws-config
    depends_on:
      postgres:
        condition: service_healthy

  migrate:
    <<: *aiws-image
    profiles: ["tools"]
    entrypoint: ["dbctl"]
    working_dir: /var/lib/aiws-config
    command:
      - --dbinit
      - /app/deploy/docker/dbinit.jsonc
      - migrate
      - --revision
      - head
    read_only: true
    tmpfs:
      - /tmp:mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - private
    volumes:
      - runtime_config:/var/lib/aiws-config:ro
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    <<: *aiws-runtime-service
    restart: unless-stopped
    command: ["backend", "--config", "/var/lib/aiws-config/config.jsonc"]
    depends_on:
      postgres:
        condition: service_healthy
        restart: true
    volumes:
      - runtime_config:/var/lib/aiws-config:ro
      - application_data:/var/lib/aiws
    ports:
      - "127.0.0.1:${AIWS_BACKEND_PORT:-8000}:8000"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >-
          import urllib.request;
          urllib.request.urlopen('http://127.0.0.1:8000/_internal/healthz', timeout=2).read()
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s

  dashboard:
    <<: *aiws-runtime-service
    profiles: ["dashboard"]
    restart: unless-stopped
    command: ["dashboard-api", "--config", "/var/lib/aiws-config/config.jsonc"]
    depends_on:
      postgres:
        condition: service_healthy
        restart: true
    ports:
      - "127.0.0.1:${AIWS_DASHBOARD_PORT:-8010}:8010"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >-
          import urllib.request;
          urllib.request.urlopen('http://127.0.0.1:8010/dashboard/v1/healthz', timeout=2).read()
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s

volumes:
  postgres_data:
  runtime_config:
  application_data:

networks:
  private:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24
