# @brief AI Job Workspace 公网边界示例 / Public ingress-boundary example.
#
# @note 该文件不能单独提供认证：身份代理（identity proxy）必须在私有网络中完成
# 用户认证、workspace membership/role 判定，并按 backend 的 trusted_proxy_hmac v1 规范
# 对最终原始 request target 重新签名。仓库不提供该身份代理实现。
#
# 拓扑：Internet -> this Nginx -> identity proxy -> backend。
# backend 与 identity proxy 均须绑定 loopback、Unix socket 或私有 Pod 网络；绝不能把
# backend:8000 映射到公网。identity proxy 转发给 backend 时必须原样保留其签名的 path/query。

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream aiws_identity_proxy {
    # Replace with the private authentication/assertion service. It is NOT this repository's backend.
    server 127.0.0.1:8100;
    keepalive 32;
}

upstream aiws_backend {
    # Keep this listener private. A Unix socket is equally suitable.
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 443 ssl http2;
    server_name workspace.example.cn;

    # TLS certificate configuration belongs to deployment-specific secret management.
    # Do not add a catch-all proxy to aiws_backend here.

    # The only publicly reachable backend surface. Nginx deliberately forwards every product
    # request to the identity proxy, including SSE and WebSocket upgrade requests.
    location /api/v1/ {
        proxy_pass http://aiws_identity_proxy;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Generate rather than forward a client-selected correlation ID.
        proxy_set_header X-Request-Id $request_id;

        # Public callers must never be able to smuggle a trusted identity assertion to the
        # identity proxy. That private proxy authenticates the caller, chooses the tenant scope,
        # and injects a fresh v1 HMAC assertion only on its own backend hop.
        proxy_set_header X-AIWS-Identity-Version "";
        proxy_set_header X-AIWS-Actor-Id "";
        proxy_set_header X-AIWS-Workspace-Id "";
        proxy_set_header X-AIWS-Resource-Owner-Id "";
        proxy_set_header X-AIWS-Auth-Timestamp "";
        proxy_set_header X-AIWS-Identity-Signature "";
        # Keep Dashboard and development-only assertions out of the public product path too.
        proxy_set_header X-AIWS-Dashboard-Token "";
        proxy_set_header X-AIWS-Dashboard-Operator-Token "";
        proxy_set_header X-Dashboard-Operator-Token "";
        proxy_set_header X-Mock-Actor-Id "";
        proxy_set_header X-Mock-Workspace-Id "";
        proxy_set_header X-Mock-Resource-Owner-Id "";

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        # SSE requires buffering disabled; WebSocket and long Agent streams need bounded long reads.
        proxy_buffering off;
        proxy_cache off;
        gzip off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Health, docs, OpenAPI and Dashboard are not product-public endpoints.
    location = /_internal/healthz { return 404; }
    location = /docs { return 404; }
    location = /openapi.json { return 404; }
    location / { return 404; }
}

# Optional local-only probe endpoint. Bind it only to loopback; public requests never have a route
# to /_internal/healthz. A service manager may instead probe aiws_backend directly on loopback.
server {
    listen 127.0.0.1:8088;
    server_name localhost;

    location = /_internal/healthz {
        proxy_pass http://aiws_backend;
        proxy_http_version 1.1;
        proxy_set_header Host localhost;
        proxy_set_header X-Request-Id $request_id;
        proxy_set_header X-AIWS-Identity-Version "";
        proxy_set_header X-AIWS-Actor-Id "";
        proxy_set_header X-AIWS-Workspace-Id "";
        proxy_set_header X-AIWS-Resource-Owner-Id "";
        proxy_set_header X-AIWS-Auth-Timestamp "";
        proxy_set_header X-AIWS-Identity-Signature "";
        proxy_set_header X-Mock-Actor-Id "";
        proxy_set_header X-Mock-Workspace-Id "";
        proxy_set_header X-Mock-Resource-Owner-Id "";
    }

    location / { return 404; }
}
