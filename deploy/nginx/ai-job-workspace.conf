# @brief API Standard V2 公网 TLS 边界 / API Standard V2 public TLS boundary.
#
# @note 固定拓扑：api.hmalliances.org:8022/TLS -> Nginx -> 127.0.0.1:9000/HTTP。
# Backend 自行验证 OAuth access token；边界覆盖所有 forwarded headers，并删除 legacy
# trusted-proxy/development assertions，客户端不能把私有身份冒充为代理签发的身份。

limit_req_zone $binary_remote_addr zone=aiws_oauth_per_ip:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=aiws_identity_per_ip:10m rate=5r/s;

upstream aiws_backend_v2 {
    server 127.0.0.1:9000;
    keepalive 64;
}

server {
    listen 8022 ssl http2;
    server_name api.hmalliances.org;

    # 路径是部署接口；证书内容由 secret manager 挂载，绝不进入镜像或仓库。
    ssl_certificate /etc/aiws/tls/fullchain.pem;
    ssl_certificate_key /etc/aiws/tls/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_tickets off;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # OAuth/OIDC discovery 与 JWKS 是公开、只读且短缓存的精确端点。
    location = /.well-known/openid-configuration {
        limit_except GET { deny all; }
        proxy_pass http://aiws_backend_v2;
        proxy_http_version 1.1;
        proxy_set_header Host api.hmalliances.org:8022;
        proxy_set_header Forwarded "";
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Host api.hmalliances.org:8022;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Request-Id $request_id;
        proxy_set_header Connection "";
        proxy_buffering on;
        proxy_cache off;
        client_max_body_size 8k;
    }

    location = /.well-known/oauth-protected-resource {
        limit_except GET { deny all; }
        proxy_pass http://aiws_backend_v2;
        proxy_http_version 1.1;
        proxy_set_header Host api.hmalliances.org:8022;
        proxy_set_header Forwarded "";
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Host api.hmalliances.org:8022;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Request-Id $request_id;
        proxy_set_header Connection "";
        proxy_buffering on;
        proxy_cache off;
        client_max_body_size 8k;
    }

    location = /oauth/jwks {
        limit_except GET { deny all; }
        proxy_pass http://aiws_backend_v2;
        proxy_http_version 1.1;
        proxy_set_header Host api.hmalliances.org:8022;
        proxy_set_header Forwarded "";
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Host api.hmalliances.org:8022;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Request-Id $request_id;
        proxy_set_header Connection "";
        proxy_buffering on;
        proxy_cache off;
        client_max_body_size 8k;
    }

    # Authorization Code + PKCE、token/revocation 以及授权恢复路径。
    location /oauth/ {
        limit_req zone=aiws_oauth_per_ip burst=30 nodelay;
        limit_req_status 429;
        client_max_body_size 64k;
        proxy_pass http://aiws_backend_v2;
        proxy_http_version 1.1;
        proxy_set_header Host api.hmalliances.org:8022;
        proxy_set_header Forwarded "";
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Host api.hmalliances.org:8022;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Request-Id $request_id;
        proxy_set_header Connection "";
        proxy_request_buffering on;
        proxy_buffering on;
        proxy_cache off;
        proxy_connect_timeout 3s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # Hosted identity 必须经过 TLS，Secure cookie/WebAuthn 不允许明文降级。
    location /identity/v2/ {
        limit_req zone=aiws_identity_per_ip burst=20 nodelay;
        limit_req_status 429;
        client_max_body_size 2m;
        proxy_pass http://aiws_backend_v2;
        proxy_http_version 1.1;
        proxy_set_header Host api.hmalliances.org:8022;
        proxy_set_header Forwarded "";
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Host api.hmalliances.org:8022;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Request-Id $request_id;
        proxy_set_header Connection "";
        proxy_request_buffering on;
        proxy_buffering on;
        proxy_cache off;
        proxy_connect_timeout 3s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    location = /userinfo {
        client_max_body_size 8k;
        proxy_pass http://aiws_backend_v2;
        proxy_http_version 1.1;
        proxy_set_header Host api.hmalliances.org:8022;
        proxy_set_header Forwarded "";
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Host api.hmalliances.org:8022;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Request-Id $request_id;
        proxy_set_header Connection "";
        proxy_buffering on;
        proxy_cache off;
    }

    # Workspace event feed 是唯一长连接 HTTP 路径；关闭 buffering/gzip 防止 SSE 延迟。
    location ~ ^/api/v2/workspaces/[^/]+/events$ {
        client_max_body_size 8k;
        proxy_pass http://aiws_backend_v2;
        proxy_http_version 1.1;
        proxy_set_header Host api.hmalliances.org:8022;
        proxy_set_header Forwarded "";
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Host api.hmalliances.org:8022;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Request-Id $request_id;
        proxy_set_header Connection "";
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_cache off;
        gzip off;
        proxy_connect_timeout 3s;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # 85 条冻结产品路由均位于此边界；Bearer token 原样交给后端密码学验证。
    location /api/v2/ {
        client_max_body_size 16m;
        proxy_pass http://aiws_backend_v2;
        proxy_http_version 1.1;
        proxy_set_header Host api.hmalliances.org:8022;
        proxy_set_header Forwarded "";
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Host api.hmalliances.org:8022;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Request-Id $request_id;

        # 防止 public caller smuggle legacy/private identity assertions。
        proxy_set_header X-AIWS-Identity-Version "";
        proxy_set_header X-AIWS-Actor-Id "";
        proxy_set_header X-AIWS-Workspace-Id "";
        proxy_set_header X-AIWS-Resource-Owner-Id "";
        proxy_set_header X-AIWS-Auth-Timestamp "";
        proxy_set_header X-AIWS-Identity-Signature "";
        proxy_set_header X-AIWS-Dashboard-Token "";
        proxy_set_header X-AIWS-Dashboard-Operator-Token "";
        proxy_set_header X-Dashboard-Operator-Token "";
        proxy_set_header X-Mock-Actor-Id "";
        proxy_set_header X-Mock-Workspace-Id "";
        proxy_set_header X-Mock-Resource-Owner-Id "";

        proxy_set_header Connection "";
        proxy_request_buffering on;
        proxy_buffering on;
        proxy_cache off;
        proxy_connect_timeout 3s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # V1、Dashboard、内部健康、docs 与任意未登记路径均不进入产品公网面。
    location /api/v1/ { return 404; }
    location = /_internal/healthz { return 404; }
    location = /docs { return 404; }
    location = /openapi.json { return 404; }
    location / { return 404; }
}

# 仅 loopback service manager 可探活；不得把此 listener 映射到公网。
server {
    listen 127.0.0.1:8088;
    server_name localhost;

    location = /_internal/healthz {
        proxy_pass http://aiws_backend_v2;
        proxy_http_version 1.1;
        proxy_set_header Host localhost;
        proxy_set_header Forwarded "";
        proxy_set_header X-Forwarded-For 127.0.0.1;
        proxy_set_header X-Forwarded-Host localhost;
        proxy_set_header X-Forwarded-Proto http;
        proxy_set_header X-Request-Id $request_id;
        proxy_set_header Connection "";
    }

    location / { return 404; }
}
